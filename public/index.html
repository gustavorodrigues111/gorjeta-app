<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f0f0f" />
    <meta name="description" content="AppTip — Gestão de equipe para restaurantes" />
    <title>AppTip</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      :root {
        --bg:        #0f0f0f;
        --bg1:       #111111;
        --bg2:       #141414;
        --bg3:       #1a1a1a;
        --bg4:       #2a2a2a;
        --bg5:       #0a0a0a;
        --border:    #2a2a2a;
        --text:      #ffffff;
        --text2:     #aaaaaa;
        --text3:     #555555;
        --card-bg:   #1a1a1a;
        --input-bg:  #111111;
        --header-bg: #141414;
        --sticky-bg: #111111;
        --sticky-bg2:#141414;
        --ac:        #f5c842;
      }

      body.light-mode {
        --bg:        #dde1e7;
        --bg1:       #e8ecf0;
        --bg2:       #d4d8de;
        --bg3:       #c8ccd2;
        --bg4:       #b8bcc4;
        --bg5:       #eef0f3;
        --border:    #b0b6c0;
        --text:      #111318;
        --text2:     #2d3340;
        --text3:     #5a6070;
        --card-bg:   #e8ecf0;
        --input-bg:  #f5f6f8;
        --header-bg: #cdd1d8;
        --sticky-bg: #e8ecf0;
        --sticky-bg2:#dde1e7;
        --ac:        #b8900a;
      }

      body { background: var(--bg); font-family: 'DM Mono', monospace; color: var(--text); transition: background 0.2s, color 0.2s; }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
