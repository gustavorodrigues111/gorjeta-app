<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#faf8f4" />
    <meta name="description" content="AppTip — Gestão de equipe para restaurantes" />
    <title>AppTip</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      /* TEMA 3 — Warm Minimal (padrão claro) */
      :root {
        --bg:        #faf8f4;
        --bg1:       #ffffff;
        --bg2:       #f2efe8;
        --bg3:       #ede9e0;
        --bg4:       #e4dfd4;
        --bg5:       #fdfcf9;
        --border:    #e8e2d8;
        --text:      #1c1710;
        --text2:     #4a3f30;
        --text3:     #9a8d7a;
        --card-bg:   #ffffff;
        --input-bg:  #faf8f4;
        --header-bg: #ffffff;
        --sticky-bg: #ffffff;
        --sticky-bg2:#f2efe8;
        --ac:        #d4a017;
        --ac-bg:     #d4a01715;
        --ac-text:   #b8880f;
        --green:     #2d8f5e;
        --green-bg:  #2d8f5e15;
        --red:       #c0392b;
        --red-bg:    #c0392b12;
        --blue:      #2563eb;
        --blue-bg:   #2563eb12;
      }

      /* TEMA ESCURO — versão escura do Warm */
      body.dark-mode {
        --bg:        #1a1510;
        --bg1:       #211c16;
        --bg2:       #2a2318;
        --bg3:       #332b1e;
        --bg4:       #3d3325;
        --bg5:       #140f0a;
        --border:    #3d3325;
        --text:      #f0ece4;
        --text2:     #c4b89a;
        --text3:     #7a6e5a;
        --card-bg:   #211c16;
        --input-bg:  #1a1510;
        --header-bg: #211c16;
        --sticky-bg: #211c16;
        --sticky-bg2:#2a2318;
        --ac:        #d4a017;
        --ac-bg:     #d4a01720;
        --ac-text:   #e8b820;
        --green:     #3db87a;
        --green-bg:  #3db87a18;
        --red:       #e05a4a;
        --red-bg:    #e05a4a15;
        --blue:      #4a90e2;
        --blue-bg:   #4a90e215;
      }

      body {
        background: var(--bg);
        font-family: 'DM Sans', sans-serif;
        color: var(--text);
        transition: background 0.2s, color 0.2s;
        -webkit-font-smoothing: antialiased;
      }

      /* Valores numéricos usam DM Mono */
      .mono { font-family: 'DM Mono', monospace !important; }

      /* Utilitários responsivos */
      .no-wrap { white-space: nowrap; }

      /* Scrollbar discreta */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
